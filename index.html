<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Bản đồ Dòng tiền - Mobile</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app scanlines">
    <header class="topbar panel">
      <div>
        <div class="eyebrow">TRUNG TÂM GIÁM SÁT DÒNG TIỀN</div>
        <h1>BẢN ĐỒ NHỊP DÒNG TIỀN</h1>
      </div>
      <div class="legend">
        <span><i class="dot gom"></i> GOM HÀNG</span>
        <span><i class="dot phan_phoi"></i> PHÂN PHỐI</span>
        <span><i class="dot theo_doi"></i> THEO DÕI</span>
      </div>
    </header>

    <main class="layout">
      <section class="core-section panel">
        <div class="core-title">LÕI DÒNG TIỀN</div>
        <div class="core-shell">
          <div class="rings"></div>
          <div class="crosshair"></div>
          <div class="core-center pulse">
            <div class="center-label">LÕI DÒNG TIỀN</div>
          </div>

          <div id="mobileNodes" class="mobile-node-list"></div>

          <div id="desktopNodes" class="desktop-node-layer"></div>
        </div>
      </section>

      <section class="signal-section panel">
        <div class="signal-head">
          <div class="signal-title">TÍN HIỆU TĂNG VỌT</div>
          <div class="signal-badge">XÁC NHẬN 3 LỚP TÍN HIỆU</div>
        </div>
        <div class="signal-body">
          <div class="signal-status">TRẠNG THÁI GOM CHỦ ĐẠO</div>
          <div class="signal-meta">
            <div><span>Mã tâm điểm</span><strong>ACB</strong></div>
            <div><span>Điểm bản tin</span><strong>99/100</strong></div>
            <div><span>Nhóm hỗ trợ</span><strong>ACB, BVB, BSR, AAS</strong></div>
          </div>
        </div>
      </section>

      <section class="list-section panel">
        <div class="list-title">MÃ THEO DÕI TRONG NGÀY</div>
        <div id="flowList" class="flow-list"></div>
      </section>
    </main>
  </div>
  <script>window.__FLOW_DATA__ = [{"symbol": "ACB", "score": 99, "trend_pct": "+99%", "phase": "KÉO DẪN DẮT", "note": "Dòng tiền vào lớn nhất, đồng pha 7 ngày", "kind": "gom"}, {"symbol": "CII", "score": 85, "trend_pct": "-85%", "phase": "XẢ HÀNG", "note": "Bán ròng áp đảo, áp lực thoát vị thế rất mạnh", "kind": "phan_phoi"}, {"symbol": "BVH", "score": 43, "trend_pct": "-43%", "phase": "PHÂN PHỐI", "note": "Áp lực bán kéo dài, dòng tiền rút ra rõ", "kind": "phan_phoi"}, {"symbol": "BVB", "score": 56, "trend_pct": "+56%", "phase": "GOM HÀNG", "note": "Dòng tiền vào duy trì, xu hướng tiếp tục tích cực", "kind": "gom"}, {"symbol": "BSR", "score": 50, "trend_pct": "+50%", "phase": "GOM HÀNG", "note": "Dòng tiền vào duy trì, xu hướng tiếp tục tích cực", "kind": "gom"}, {"symbol": "AAS", "score": 28, "trend_pct": "+28%", "phase": "GOM HÀNG", "note": "Dòng tiền vào duy trì, xu hướng tiếp tục tích cực", "kind": "gom"}, {"symbol": "BID", "score": 24, "trend_pct": "+24%", "phase": "HẤP THỤ CUNG", "note": "Lực mua đang hấp thụ lượng bán ra", "kind": "theo_doi"}, {"symbol": "BMP", "score": 21, "trend_pct": "-21%", "phase": "RÚT DÒNG TIỀN", "note": "Tiền đang rời khỏi mã, cần theo dõi thêm", "kind": "phan_phoi"}];</script>
  <script src="./app.js"></script>
</body>
</html>
